<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumedha's Profile</title>
    <style>
        body {
            /* මෙතැනින් පසුබිම් වර්ණය (Dark Blue Gradient) පාලනය වේ */
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #00d2ff;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 20px #00d2ff;
        }
        h1 {
            margin: 10px 0;
            font-size: 2.5em;
            letter-spacing: 2px;
            color: #00d2ff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        p {
            font-size: 1.2em;
            color: #bdc3c7;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Sigma-Anime-DP-hd.jpg" alt="Profile Picture">
        <h1>W. Sumedha</h1>
        <p>මගේ නිල වෙබ් අඩවියට සාදරයෙන් පිළිගනිමි!</p>
    </div>
</body>
</html>
