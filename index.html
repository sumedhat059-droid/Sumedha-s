<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W. Sumedha's Web</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #f0f8ff; /* පසුබිම් වර්ණය */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 350px;
        }
        h1 { color: #007bff; }
        p { color: #333; margin-bottom: 20px; }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            border: 2px solid #007bff;
            display: block;
            margin: 0 auto;
        }
        button {
            margin-top: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>ආයුබෝවන්!</h1>
        <p>මම <b>W. Sumedha</b>. මෙය මගේ පළමු වෙබ් අඩවියයි.</p>
        
      <img src="Sigma-Anime-DP-hd.jpg" width="250"jpPhoto">
        
        <br>
        <button onclick="alert('වැඩේ සාර්ථකයි Sumedha!')">මෙතන ඔබන්න</button>
    </div>
</body>
</html>
