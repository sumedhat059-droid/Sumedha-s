<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumedha's Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .header { padding: 20px; background: #1e1e1e; border-bottom: 1px solid #333; text-align: center; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; padding: 15px; }
        .post { background: #1e1e1e; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        img { width: 100%; display: block; }
        .caption { padding: 10px; font-size: 14px; color: #bbb; }
        .floating-btn {
            position: fixed; bottom: 30px; right: 30px;
            background: #00d2ff; width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 30px; color: white;
            box-shadow: 0 4px 15px rgba(0,210,255,0.4); text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="header"><h2>W. Sumedha Gallery</h2></div>
    <div class="gallery">
        <div class="post">
            <img src="Sigma-Anime-DP-hd.jpg">
            <div class="caption">පළමු පින්තූරය</div>
        </div>
    </div>
    <a href="https://github.com/sumedhat059-droid/Sumedha-s/upload/main" class="floating-btn">
        <i class="fas fa-plus"></i>
    </a>
</body>
</html>
